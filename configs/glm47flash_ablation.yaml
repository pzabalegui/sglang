# Configuration for GLM-4.7-Flash Ablation Experiments
# Model: 30B-A3B MoE (31B params, ~3B active per token)

model:
  name: "zai-org/GLM-4.7-Flash"
  type: "moe"
  architecture: "glm4_moe_lite"
  num_layers: 47
  hidden_size: 2048  # d_model
  intermediate_size: 10240  # dense MLP
  moe_intermediate_size: 1536  # per-expert MLP

  # MoE configuration
  moe:
    n_routed_experts: 64
    n_shared_experts: 1
    num_experts_per_tok: 4
    topk_method: "noaux_tc"

  # Attention configuration (LoRA-based)
  attention:
    num_heads: 20
    num_kv_heads: 20
    q_lora_rank: 768
    kv_lora_rank: 512

experiment:
  name: "glm47flash_ablation_v1"
  technique: "ablation"

parameters:
  # Layer selection: 75% depth = layer 35 (of 47)
  layer: 35
  n_inst_train: 128
  use_4bit: true  # Recommended: model is 31B params
  direction_method: "mean"

generation:
  max_new_tokens: 256
  temperature: 0.7
  do_sample: false

# Expected requirements
hardware:
  min_vram_4bit: "24GB"  # L40S should work
  min_vram_fp16: "64GB"  # Need A100 80GB or 2x L40S
  recommended: "1x L40S 48GB with 4-bit quantization"

results:
  bypass_rate: null  # TBD
  notes: "Pending first run"
